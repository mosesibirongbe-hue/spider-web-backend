<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Email Forgot Password</title>
</head>

<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background-color:#f4f6f8;">
    
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                
                <table width="500" cellpadding="0" cellspacing="0"
                style="background:white;margin-top:40px;border-radius:8px;padding:40px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                
                <tr>
                    <td align="center">
                            <h1 style="color:#990a0a;">SpiderWeb</h1>

                            <h2 style="color:#333;margin-bottom:10px;">Change Password</h2>

                            <p style="color:#555;font-size:15px;">
                                Use the Forgot Password code below to to change your password.
                            </p>

                            <div style="margin:30px 0;">
                                <span style="font-size:34px;font-weight:bold;letter-spacing:6px;color:#2563eb;">
                                    {{CODE}}
                                </span>
                            </div>

                            <p style="color:#777;font-size:14px;">
                                This code will expire in <b>10 minutes</b>. Do not share this code with anyone.
                            </p>

                            <hr style="border:none;border-top:1px solid #eee;margin:30px 0;">

                            <p style="font-size:12px;color:#999;">
                                If you did not request this Forgot Password Code, you can safely ignore this email.
                            </p>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
